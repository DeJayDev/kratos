services:
  caddy:
    build: .
    image: kratos-caddy:local
    restart: unless-stopped
    network_mode: host
    command: ["caddy", "run", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
    env_file:
      - ./caddy.env
    volumes:
      - ../../.data/caddy/data:/data
      - ./config:/etc/caddy:ro
